site_name: Chatrix.One | Документация
site_url: https://docs.chatrix.one/
site_description: >-
  Документация за Chatrix.One — Privacy-friendly XMPP сървър.
  Без телеметрия, без реклами. Безплатно и с отворен код.

# Theme
theme:
  name: material
  custom_dir: overrides
  language: bg
  favicon: assets/favicon.svg
  logo: assets/logo.svg
  font: false

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.footer
    - navigation.top
    - toc.integrate
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - search.highlight
    - search.share
    - search.suggest

  palette:
    - scheme: slate
      toggle:
        icon: material/brightness-7
        name: Светла тема
      primary: custom
      accent: custom
    - scheme: default
      toggle:
        icon: material/brightness-4
        name: Тъмна тема
      primary: custom
      accent: custom

  icon:
    admonition:
      danger: octicons/alert-16
    annotation: material/plus-circle

# Extra CSS
extra_css:
  - stylesheets/fonts.css
  - stylesheets/extra.css

# Extra JavaScript
# Mermaid is self-hosted to avoid unpkg.com requests on FAQ pages.
# Run ./fetch-mermaid.sh once after cloning to download the file.
# Material detects this entry and skips its own unpkg injection automatically.
extra_javascript:
  - assets/javascripts/mermaid.min.js

# Customization
extra:
  generator: false
  alternate:
    - name: БГ
      link: /
      lang: bg
    - name: EN
      link: /en/
      lang: en
  social:
    - icon: fontawesome/solid/earth-americas
      link: https://chatrix.one
      name: Уебсайт
    - icon: fontawesome/brands/github
      link: https://github.com/ChatrixOne
      name: GitHub
    - icon: fontawesome/solid/envelope
      link: mailto:admin@chatrix.one
      name: Имейл

# Markdown extensions
markdown_extensions:
  - admonition
  - footnotes
  - def_list
  - abbr
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - attr_list
  - md_in_html
  - pymdownx.inlinehilite
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

# Navigation
nav:
  - Начало: bg/index.md
  - Профил:
    - Регистрация: bg/account/registration.md
    - Онлайн форма: bg/account/registration-form.md
    - Смяна на парола: bg/account/change-password.md
    - Изтриване на профил: bg/account/delete-account.md
  - Клиенти: bg/clients.md
  - ЧЗВ: bg/faq.md
  - Условия: bg/terms.md
  - Поверителност: bg/privacy.md
  - Статус: bg/status.md
  - За нас: bg/about.md

# Plugins
plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: false
      languages:
        - locale: bg
          default: true
          name: 🇧🇬 Български
          build: true
          site_name: "Chatrix.One | Документация"
        - locale: en
          name: 🇬🇧 English
          build: true
          site_name: "Chatrix.One | Documentation"
          nav_translations:
            Начало: Home
            Профил: Account
            Регистрация: Registration
            Онлайн форма: Online Form
            Смяна на парола: Change Password
            Изтриване на профил: Delete Account
            Клиенти: Clients
            ЧЗВ: FAQ
            Условия: Terms
            Поверителност: Privacy
            Статус: Status
            За нас: About

